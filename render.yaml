services:
  - type: web
    name: ai-writer-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: PORT
        value: "3000"
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: MASTER_API_KEY
        sync: false
